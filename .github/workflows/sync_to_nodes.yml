name: Sync to All Nodes
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false # Important: prevents conflict with PAT

      - name: Prepare Clean Code
        run: |
          # Remove its own workflow directory before syncing to node repos
          rm -rf .github/workflows
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add .
          git commit -m "Sync: remove workflows for nodes" || echo "No changes"

      - name: Push to Node Repos
        env:
          PAT: ${{ secrets.SYNC_PAT }}
          PREFIX: "doh-node"
          COUNT: 100
          CONCURRENCY: 20 # Increased concurrency for faster silent run
        run: |
          OWNER="${{ github.repository_owner }}"
          RESULT_DIR="sync_results"
          mkdir -p $RESULT_DIR
          
          echo "Syncing $COUNT nodes in silence... Please wait."

          push_with_retry() {
            local repo=$1
            local url=$2
            local attempt=1
            
            while [ $attempt -le 3 ]; do
              if git push "$url" HEAD:main --force --quiet 2>/dev/null; then
                touch "$RESULT_DIR/ok_$repo"
                return 0
              else
                sleep 1
                attempt=$((attempt + 1))
              fi
            done
            touch "$RESULT_DIR/fail_$repo"
            return 1
          }

          for i in $(seq -f "%03g" 1 $COUNT); do
            REPO_NAME="${PREFIX}-${i}"
            REMOTE_URL="https://x-access-token:${PAT}@github.com/${OWNER}/${REPO_NAME}.git"
            
            push_with_retry "$REPO_NAME" "$REMOTE_URL" &
            
            if [[ $(jobs -r | wc -l) -ge $CONCURRENCY ]]; then
              wait -n
            fi
          done
          
          wait
          
          OK_COUNT=$(find $RESULT_DIR -name "ok_*" | wc -l)
          FAIL_COUNT=$(find $RESULT_DIR -name "fail_*" | wc -l)
          
          echo "======================================="
          echo " SYNC SUMMARY:"
          echo " - Total: $COUNT"
          echo " - Success: $OK_COUNT"
          echo " - Failed: $FAIL_COUNT"
          echo "======================================="
          
          if [ $FAIL_COUNT -gt 0 ]; then
            echo "List of failed repos:"
            ls $RESULT_DIR/fail_* | sed 's/.*fail_//'
            exit 1
          fi
